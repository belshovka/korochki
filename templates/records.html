{% extends "_layout.html" %}

{% block content %}
<h1>Все заявки</h1>
{% if records %}
    <ul>
        {% for record in records %}
        <li>{{ record.course }} - {{ record.date }} - {{ record.payment }} - {{ record.status }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>Заявок нет</p>
{% endif %}
{% endblock %}
